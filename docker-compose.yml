services:
  app:
    build:
      context: .
      dockerfile: docker/php/DockerFile
    container_name: apps
    volumes:
      - ./src:/var/www
    networks:
      - MyAppsNetwork

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - MyAppsNetwork

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: superadmin
      MYSQL_PASSWORD: AdminSecret007!
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - MyAppsNetwork

networks:
  MyAppsNetwork:

volumes:
  mysql_data:
