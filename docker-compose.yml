services:
  app:
    build:
      context: .
      dockerfile: docker/php/DockerFile
    container_name: apps
    volumes:
      - ./src:/var/www
    depends_on:
      - mysql
    networks:
      - MyAppsNetwork

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - MyAppsNetwork

  mysql:
    image: mysql:latest
    container_name: mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - MyAppsNetwork

networks:
  MyAppsNetwork:

volumes:
  mysql_data:
